- slug: managed-kubernetes
  name: Managed Kubernetes
  role: ionos-director
  summary: >
    Core product team responsible for IONOS Managed Kubernetes — ~1,500 production
    clusters and ~2,200 managed nodes. Involved with the product since its inception
